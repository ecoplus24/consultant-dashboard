name: 컨설턴트 공고 수집

on:
  # 수동 실행 (Actions 탭에서 버튼으로 실행 가능)
  workflow_dispatch:

  # 스케줄 실행 - 매일 한국시간 오전 8시, 오후 2시
  # GitHub Actions는 UTC 기준이므로 KST = UTC + 9시간
  # 한국시간 08:00 = UTC 23:00 (전날), 한국시간 14:00 = UTC 05:00
  schedule:
    - cron: '0 23 * * *'   # 매일 한국시간 08:00
    - cron: '0 5 * * *'    # 매일 한국시간 14:00

# 저장소에 커밋할 권한 부여
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 스크레이퍼 실행
        run: python scraper.py

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "데이터 자동 갱신: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
